<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --bg2:      #161b22;
    --bg3:      #21262d;
    --border:   #30363d;
    --text:     #e6edf3;
    --text2:    #8b949e;
    --green:    #3fb950;
    --red:      #f85149;
    --yellow:   #d29922;
    --blue:     #58a6ff;
    --purple:   #bc8cff;
    --orange:   #ffa657;
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; }

  /* ── 顶栏 ── */
  header { display: flex; align-items: center; gap: 16px; padding: 12px 24px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: .5px; }
  .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-live { background: #1a3a1a; color: var(--green); }
  .spacer { flex: 1; }
  .refresh-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer; font-size: 13px; }
  .refresh-btn:hover { background: var(--border); }
  #last-update { font-size: 12px; color: var(--text2); }

  /* ── 标签页 ── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 24px; }
  .tab { padding: 10px 18px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; font-size: 13px; transition: color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* ── 主内容 ── */
  main { padding: 20px 24px; }

  /* ── 统计卡片 ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── 过滤栏 ── */
  .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input[type=number] { padding: 5px 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; }
  .filter-bar label { font-size: 12px; color: var(--text2); }
  .filter-bar input[type=checkbox] { accent-color: var(--blue); width:14px; height:14px; cursor:pointer; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* ── 高质量提示条 ── */
  .quality-hint { padding: 8px 12px; background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 6px; font-size: 12px; color: var(--green); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .quality-hint b { font-weight: 600; }

  /* ── 结果表格 ── */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); }
  th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  td.symbol { font-weight: 600; font-size: 13px; }
  td.mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }

  /* ── 徽章 ── */
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .pill-long    { background: #1a3a1a; color: var(--green); }
  .pill-short   { background: #3a1a1a; color: var(--red); }
  .pill-neutral { background: var(--bg3); color: var(--text2); }
  .pill-bull    { background: #1a3a1a; color: var(--green); }
  .pill-bear    { background: #3a1a1a; color: var(--red); }
  .pill-ranging { background: #1a2a3a; color: var(--blue); }
  .pill-high    { background: #1a3a1a; color: var(--green); }
  .pill-medium  { background: #2a2a1a; color: var(--yellow); }
  .pill-low     { background: #3a1a1a; color: var(--red); }
  .pill-A       { background: #1a3a1a; color: var(--green); }
  .pill-B       { background: #3a1a1a; color: var(--red); }
  .pill-C       { background: var(--bg3); color: var(--text2); }
  /* 体制强弱 */
  .str-strong { color: var(--green); font-size: 11px; font-weight: 600; }
  .str-medium { color: var(--yellow); font-size: 11px; }
  .str-weak   { color: var(--red); font-size: 11px; }
  /* 周期切换按钮 */
  .tf-btn { background: var(--card); border: 1px solid var(--border); color: var(--text2);
            padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .tf-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  /* 周期 badge */
  .tf-4h  { background:#1a2a3a; color:var(--blue);   font-size:10px; padding:1px 5px; border-radius:3px; }
  .tf-1h  { background:#1a3a2a; color:#4fc; font-size:10px; padding:1px 5px; border-radius:3px; }
  .tf-15m { background:#2a1a3a; color:#c8f; font-size:10px; padding:1px 5px; border-radius:3px; }

  /* ── 分数条 ── */
  .score-wrap { display: flex; align-items: center; gap: 8px; }
  .score-bar  { flex: 1; min-width: 60px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; }
  .score-num  { font-size: 12px; font-weight: 600; min-width: 32px; text-align: right; }

  /* ── 触发标记 ── */
  .trigger-yes { color: var(--green); font-weight: 600; }
  .trigger-no  { color: var(--border); }

  /* ── LLM置信度 ── */
  .llm-high   { color: var(--green); font-weight: 600; }
  .llm-medium { color: var(--yellow); }
  .llm-low    { color: var(--red); }

  /* ── 展开行 ── */
  tr.expandable { cursor: pointer; }
  tr.expandable:hover td { background: #1c2230; }
  tr.detail-row td { padding: 0; background: #0d1117; }
  .detail-panel { padding: 14px 20px 14px 48px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-block h4 { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
  .detail-field { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-top: 1px solid var(--border); font-size: 12px; }
  .detail-field:first-of-type { border-top: none; }
  .df-status { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
  .df-pass   { background: #1a3a1a; color: var(--green); }
  .df-fail   { background: #3a1a1a; color: var(--red); }
  .df-na     { background: var(--bg3); color: var(--text2); }
  .df-name   { flex: 1; color: var(--text); }
  .df-val    { font-family: monospace; font-size: 11px; color: var(--text2); }
  .llm-reasoning { font-size: 12px; color: var(--text2); line-height: 1.6; grid-column: 1 / -1; padding: 10px 12px; background: var(--bg2); border-radius: 6px; border-left: 3px solid var(--blue); }

  /* ── 形态定义卡片 ── */
  .pattern-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .pattern-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pattern-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .pattern-card-header h3 { font-size: 14px; font-weight: 600; flex: 1; }
  .pattern-card-header .pid { font-size: 12px; color: var(--text2); font-family: monospace; }
  .field-section { margin-top: 10px; }
  .field-section-title { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
  .field-item { display: flex; align-items: flex-start; gap: 6px; padding: 4px 0; border-top: 1px solid var(--border); font-size: 12px; }
  .field-item:first-child { border-top: none; }
  .field-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-required { background: var(--green); }
  .dot-optional { background: var(--text2); }
  .dot-exclude  { background: var(--red); }
  .dot-trigger  { background: var(--blue); }
  .field-name { font-weight: 500; }
  .field-indicator { color: var(--text2); margin-left: 4px; font-family: monospace; font-size: 11px; }
  .regime-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }

  /* ── 回测表 ── */
  .backtest-section { margin-bottom: 28px; }
  .backtest-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  .backtest-section h3 span { color: var(--text); }
  .bt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .bt-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .bt-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .bt-card-header b { font-size: 13px; }
  .bt-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-top: 1px solid var(--border); }
  .bt-row:first-of-type { border-top: none; }
  .bt-row .key { color: var(--text2); }
  .bt-row .val { font-weight: 600; }
  .val-good { color: var(--green); }
  .val-bad  { color: var(--red); }
  .val-mid  { color: var(--yellow); }
  .empty-backtest { text-align: center; padding: 60px 0; color: var(--text2); }
  .empty-backtest p { margin-top: 8px; font-size: 13px; }

  /* ── 空状态 ── */
  .empty { text-align: center; padding: 60px 0; color: var(--text2); }
  .empty .icon { font-size: 32px; margin-bottom: 12px; }

  /* ── 加载 ── */
  .loading { text-align: center; padding: 40px; color: var(--text2); }

  /* ── 隐藏 ── */
  .hidden { display: none !important; }

  /* ── 滚动条 ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>Pattern Scanner</h1>
  <span class="badge badge-live">LIVE</span>
  <div class="spacer"></div>
  <span id="last-update"></span>
  <button class="refresh-btn" onclick="loadAll()">刷新</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('results', this)">扫描结果</div>
  <div class="tab" onclick="switchTab('patterns', this)">形态定义</div>
  <div class="tab" onclick="switchTab('history', this)">历史分析</div>
  <div class="tab" onclick="switchTab('backtest', this)">回测统计</div>
  <div class="tab" onclick="switchTab('diagnose', this)">K线诊断</div>
</div>

<main>

  <!-- ── 结果页 ── -->
  <div id="tab-results">
    <div class="stat-grid" id="stat-grid"></div>

    <div class="filter-bar">
      <label>形态</label>
      <select id="f-pattern" onchange="renderResults()">
        <option value="">全部</option>
        <option value="A1">A1 上升后平台整理</option>
        <option value="A2">A2 长均线托底横盘</option>
        <option value="A3">A3 假跌破回收</option>
        <option value="B1">B1 下跌中继</option>
        <option value="B2">B2 平台破位</option>
        <option value="B3">B3 空头趋势弱反弹</option>
      </select>
      <label>方向</label>
      <select id="f-direction" onchange="renderResults()">
        <option value="">全部</option>
        <option value="long">做多</option>
        <option value="short">做空</option>
      </select>
      <div class="filter-sep"></div>
      <label>最低分</label>
      <input type="number" id="f-score" value="75" min="0" max="100" style="width:68px" onchange="renderResults()">
      <label>仅触发</label>
      <input type="checkbox" id="f-trigger" onchange="renderResults()">
      <label>LLM置信≥0.7</label>
      <input type="checkbox" id="f-llm" onchange="renderResults()">
      <div class="filter-sep"></div>
      <label>时间范围</label>
      <select id="f-hours" onchange="loadResults()">
        <option value="6">6h</option>
        <option value="24" selected>24h</option>
        <option value="48">48h</option>
        <option value="168">7天</option>
      </select>
      <div class="filter-sep"></div>
      <label>周期</label>
      <div style="display:flex;gap:4px">
        <button class="tf-btn active" onclick="setTF('', this)">全部</button>
        <button class="tf-btn" onclick="setTF('4h', this)">4h</button>
        <button class="tf-btn" onclick="setTF('1h', this)">1h</button>
        <button class="tf-btn" onclick="setTF('15m', this)">15m</button>
      </div>
    </div>

    <div id="quality-hint" class="quality-hint hidden">
      <b id="quality-count">0</b> 条高质量信号（≥85分）·
      <b id="trigger-count">0</b> 条已触发 ·
      <b id="llm-pool-count">0</b> 条 LLM 入池
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>交易对</th>
            <th>形态</th>
            <th>方向</th>
            <th>得分</th>
            <th>体制</th>
            <th>强度</th>
            <th>周期</th>
            <th>触发</th>
            <th>LLM置信</th>
            <th>K线时间 / 分析窗口</th>
          </tr>
        </thead>
        <tbody id="result-tbody">
          <tr><td colspan="10" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── 形态定义页 ── -->
  <div id="tab-patterns" class="hidden">
    <div class="pattern-grid" id="pattern-grid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- ── 历史分析页 ── -->
  <div id="tab-history" class="hidden">
    <div class="filter-bar" style="margin-bottom:16px">
      <label>形态</label>
      <select id="h-pattern">
        <option value="">全部</option>
        <option value="A1">A1 上升后平台整理</option>
        <option value="A2">A2 长均线托底横盘</option>
        <option value="A3">A3 假跌破回收</option>
        <option value="B1">B1 下跌中继</option>
        <option value="B2">B2 平台破位</option>
        <option value="B3">B3 空头趋势弱反弹</option>
      </select>
      <label>交易对</label>
      <input type="text" id="h-symbol" placeholder="如 BTCUSDT" style="width:120px;padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
      <label>体制</label>
      <select id="h-regime">
        <option value="">全部</option>
        <option value="bull_trend">bull trend</option>
        <option value="bear_trend">bear trend</option>
        <option value="ranging">ranging</option>
      </select>
      <label>天数</label>
      <select id="h-days">
        <option value="7">7天</option>
        <option value="30" selected>30天</option>
        <option value="90">90天</option>
      </select>
      <label>远期K线</label>
      <select id="h-fwd">
        <option value="4">4根(16h)</option>
        <option value="12" selected>12根(48h)</option>
        <option value="24">24根(96h)</option>
      </select>
      <button onclick="loadHistory()" style="padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px">查询</button>
      <div class="filter-sep"></div>
      <button id="bt-run-btn" onclick="runBacktest()" style="padding:5px 14px;border-radius:6px;border:1px solid var(--blue);background:#0d1f3a;color:var(--blue);cursor:pointer;font-size:13px">运行回测</button>
    </div>

    <!-- 汇总统计条 -->
    <div id="h-summary" class="hidden" style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap"></div>

    <!-- 远期收益分布 -->
    <div id="h-dist" class="hidden" style="margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px">
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">远期收益分布（每格=0.5%）</div>
      <div id="h-dist-bars" style="display:flex;align-items:flex-end;gap:2px;height:60px"></div>
      <div id="h-dist-labels" style="display:flex;gap:2px;margin-top:4px;font-size:10px;color:var(--text2)"></div>
    </div>

    <!-- 命中记录表 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>交易对</th><th>形态</th><th>方向</th><th>得分</th><th>体制</th>
            <th>触发</th><th>LLM</th><th>K线时间</th>
            <th>远期收益(${document.getElementById('h-fwd')?.value||12}根)</th>
          </tr>
        </thead>
        <tbody id="h-tbody"><tr><td colspan="9" class="loading">选择条件后点击查询</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ── 回测统计页 ── -->
  <div id="tab-backtest" class="hidden">
    <div id="backtest-content">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- ── K线诊断页 ── -->
  <div id="tab-diagnose" class="hidden">
    <div class="filter-bar" style="gap:12px;flex-wrap:wrap">
      <label>交易对</label>
      <input id="dg-symbol" type="text" placeholder="BTC" style="width:90px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px">
      <label>截止时间</label>
      <input id="dg-endtime" type="datetime-local" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px">
      <label>回看K线</label>
      <select id="dg-lookback" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px">
        <option value="50">50根</option>
        <option value="100" selected>100根</option>
        <option value="200">200根</option>
        <option value="300">300根</option>
      </select>
      <label>周期</label>
      <select id="dg-tf" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:13px">
        <option value="4h" selected>4h</option>
        <option value="1h">1h</option>
        <option value="1d">1d</option>
      </select>
      <button onclick="runDiagnose()" style="background:var(--blue);color:#fff;border:none;padding:6px 18px;border-radius:4px;cursor:pointer;font-size:13px">开始诊断</button>
    </div>
    <div id="dg-result"></div>
  </div>

</main>

<script>
let _results      = [];
let _patterns     = [];
let _patternMap   = {};   // pattern_id → {min_bars, timeframes}
let _stats        = {};
let _backtest     = [];

// ── 周期过滤 ─────────────────────────────────────────────────────────────────
let _tfFilter = '';
function setTF(tf, el) {
  _tfFilter = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadResults();
}

// ── 标签切换 ────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['results','patterns','history','backtest','diagnose'].forEach(n => {
    document.getElementById('tab-' + n).classList.toggle('hidden', n !== name);
  });
  if (name === 'backtest' && !_backtest.length) loadBacktest();
}

// ── 加载数据 ─────────────────────────────────────────────────────────────────
async function loadResults() {
  const hours = document.getElementById('f-hours').value;
  const tfParam = _tfFilter ? `&tf=${_tfFilter}` : '';
  try {
    const r = await fetch(`/api/results?limit=500&hours=${hours}${tfParam}`);
    const d = await r.json();
    _results = d.results || [];
    renderResults();
  } catch(e) { console.error('loadResults:', e); }
}

async function loadStats() {
  const hours = document.getElementById('f-hours').value;
  try {
    const r = await fetch(`/api/stats?hours=${hours}`);
    _stats = await r.json();
    renderStats();

async function loadPatterns() {
  if (_patterns.length) return;
  try {
    const r = await fetch('/api/patterns');

    for (const p of _patterns) {
      _patternMap[p.pattern_id] = p;
    }
    renderPatterns();
  } catch(e) { console.error('loadPatterns:', e); }
}

async function loadBacktest() {

    _backtest = d.backtest || [];
    renderBacktest();

}

// ── 渲染结果表格 ──────────────────────────────────────────────────────────────
function renderResults() {
  const pid      = document.getElementById('f-pattern').value;
  const dir      = document.getElementById('f-direction').value;
  const minScore = parseFloat(document.getElementById('f-score').value) || 0;
  const trigOnly = document.getElementById('f-trigger').checked;
  const llmOnly  = document.getElementById('f-llm').checked;

  let rows = _results
    .filter(r => !pid      || r.pattern_id === pid)
    .filter(r => !dir      || r.direction  === dir)
    .filter(r => r.total_score >= minScore)
    .filter(r => !trigOnly || r.trigger_met)
    .filter(r => !llmOnly  || r.llm_confidence === 'high');

  // 更新提示条
  const high    = rows.filter(r => r.total_score >= 85).length;
  const trigd   = rows.filter(r => r.trigger_met).length;
  const pool    = rows.filter(r => r.llm_enter_pool).length;
  const hint    = document.getElementById('quality-hint');
  if (rows.length) {
    document.getElementById('quality-count').textContent  = high;
    document.getElementById('trigger-count').textContent  = trigd;
    document.getElementById('llm-pool-count').textContent = pool;
    hint.classList.remove('hidden');
  } else {
    hint.classList.add('hidden');
  }

  if (!rows.length) {
    document.getElementById('result-tbody').innerHTML =
      `<tr><td colspan="10" class="empty"><div class="icon">🔍</div>暂无匹配结果</td></tr>`;
    return;
  }

  document.getElementById('result-tbody').innerHTML = rows.map(r => {
    const score    = r.total_score || 0;
    const color    = score >= 85 ? 'var(--green)' : score >= 75 ? 'var(--yellow)' : 'var(--text2)';
    const regime   = r.regime || '';
    const regClass = regime.includes('bull') ? 'bull'
                   : regime.includes('bear') ? 'bear'
                   : regime.includes('ranging') ? 'ranging' : '';
    const barDt    = r.bar_time ? new Date(r.bar_time) : null;
    const barTime  = barDt
      ? barDt.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    // 计算分析窗口起始时间
    const pDef     = _patternMap[r.pattern_id];
    const tfHours  = r.timeframe === '4h' ? 4 : r.timeframe === '1h' ? 1 : r.timeframe === '1d' ? 24 : 4;
    const minBars  = pDef ? pDef.min_bars : 45;
    const windowMs = minBars * tfHours * 3600 * 1000;
    const winStart = barDt ? new Date(barDt.getTime() - windowMs) : null;
    const winStr   = winStart
      ? winStart.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';

    // LLM 置信度（存储值为 'high'/'medium'/'low' 字符串）
    const conf = r.llm_confidence;
    let llmHtml;
    if (!conf) {
      llmHtml = '<span style="color:var(--border)">—</span>';
    } else {
      const cls   = conf === 'high' ? 'llm-high' : conf === 'medium' ? 'llm-medium' : 'llm-low';
      const label = conf === 'high' ? '高' : conf === 'medium' ? '中' : '低';
      const pool  = r.llm_enter_pool ? ' <span style="color:var(--green)">✓</span>' : '';
      llmHtml = `<span class="${cls}">${label}${pool}</span>`;
    }

    // 体制强度（从 raw_values 或 meta 中取，暂用 regime_score 代理）
    const rscore = r.regime_score || 0;
    let strHtml;
    if (rscore >= 75)      strHtml = '<span class="str-strong">强</span>';
    else if (rscore >= 55) strHtml = '<span class="str-medium">中</span>';
    else                   strHtml = '<span class="str-weak">弱</span>';

    const cat = r.pattern_id ? r.pattern_id[0] : '';
    const rid = `row-${r.id}`;
    const mainRow = `<tr class="expandable" onclick="toggleDetail('${rid}')">
      <td class="symbol">${r.symbol.replace('USDT','')}<span style="color:var(--text2);font-weight:400">/USDT</span></td>
      <td><span class="pill pill-${cat}">${r.pattern_id}</span> <span style="color:var(--text2);font-size:12px">${r.pattern_name || ''}</span></td>
      <td><span class="pill pill-${r.direction}">${r.direction === 'long' ? '做多' : r.direction === 'short' ? '做空' : '中性'}</span></td>
      <td>
        <div class="score-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${score}%;background:${color}"></div></div>
          <span class="score-num" style="color:${color}">${score.toFixed(0)}</span>
        </div>
      </td>
      <td><span class="pill pill-${regClass}">${regime.replace('_',' ')}</span></td>
      <td>${strHtml}</td>
      <td><span class="tf-${(r.timeframe||'4h').replace('m','m')}">${r.timeframe||'4h'}</span></td>
      <td class="${r.trigger_met ? 'trigger-yes' : 'trigger-no'}">${r.trigger_met ? '✓ 触发' : '—'}</td>
      <td>${llmHtml}</td>
      <td style="font-size:12px">
        ${winStr ? `<div style="color:var(--text2);font-size:11px">${winStr}</div>` : ''}
        <div style="color:var(--text)">→ ${barTime}</div>
      </td>
    </tr>`;
    const detailRow = `<tr class="detail-row hidden" id="${rid}">${buildDetailCell(r, pDef, winStr, barTime)}</tr>`;
    return mainRow + detailRow;
  }).join('');
}

async function loadHistory() {
  const pid  = document.getElementById('h-pattern').value;
  const sym  = document.getElementById('h-symbol').value.trim().toUpperCase();
  const reg  = document.getElementById('h-regime').value;
  const days = document.getElementById('h-days').value;
  const fwd  = document.getElementById('h-fwd').value;
  document.getElementById('h-tbody').innerHTML = `<tr><td colspan="9" class="loading">查询中...</td></tr>`;
  document.getElementById('h-summary').classList.add('hidden');
  document.getElementById('h-dist').classList.add('hidden');

  let url = `/api/scan-history?days=${days}&forward_bars=${fwd}&limit=500`;
  if (pid) url += `&pattern_id=${pid}`;
  if (sym) url += `&symbol=${sym}`;
  if (reg) url += `&regime=${reg}`;

  try {
    const r = await fetch(url);
    const d = await r.json();
    renderHistory(d.hits || [], d.summary || {}, parseInt(fwd));
  } catch(e) {
    document.getElementById('h-tbody').innerHTML = `<tr><td colspan="9" style="color:var(--red);text-align:center">${e}</td></tr>`;
  }
}

function renderHistory(hits, summary, fwd) {
  // 汇总条
  if (summary.sample > 0) {
    const wr = ((summary.win_rate || 0) * 100).toFixed(1);
    const ar = ((summary.avg_return || 0) * 100).toFixed(2);
    const cards = [
      { label: '样本数', val: summary.sample, color: '' },
      { label: '胜率', val: wr + '%', color: summary.win_rate >= 0.55 ? 'var(--green)' : summary.win_rate >= 0.45 ? 'var(--yellow)' : 'var(--red)' },
      { label: '平均收益', val: ar + '%', color: summary.avg_return > 0 ? 'var(--green)' : 'var(--red)' },
      { label: '最大收益', val: ((summary.max_return||0)*100).toFixed(2)+'%', color: 'var(--green)' },
      { label: '最大亏损', val: ((summary.min_return||0)*100).toFixed(2)+'%', color: 'var(--red)' },
    ];
    const el = document.getElementById('h-summary');
    el.innerHTML = cards.map(c => `
      <div class="stat-card" style="min-width:120px">
        <div class="label">${c.label}</div>
        <div class="value" style="font-size:20px;${c.color?'color:'+c.color:''}">${c.val}</div>
      </div>`).join('');
    el.classList.remove('hidden');

    // 分布图
    const rets = hits.filter(h => h.forward_return != null).map(h => h.forward_return);
    if (rets.length) renderDist(rets);
  }

  if (!hits.length) {
    document.getElementById('h-tbody').innerHTML = `<tr><td colspan="9" class="empty"><div class="icon">🔍</div>暂无历史记录</td></tr>`;
    return;
  }

  document.getElementById('h-tbody').innerHTML = hits.map(h => {
    const score = h.total_score || 0;
    const color = score >= 85 ? 'var(--green)' : score >= 75 ? 'var(--yellow)' : 'var(--text2)';
    const cat   = (h.pattern_id||'')[0];
    const fwdRet = h.forward_return;
    let fwdHtml;
    if (fwdRet == null) {
      fwdHtml = '<span style="color:var(--text2)">—</span>';
    } else {
      const pct = (fwdRet * 100).toFixed(2) + '%';
      const fc  = fwdRet > 0.01 ? 'var(--green)' : fwdRet < -0.01 ? 'var(--red)' : 'var(--yellow)';
      fwdHtml = `<span style="color:${fc};font-weight:600">${fwdRet > 0 ? '+' : ''}${pct}</span>`;
    }
    const conf = h.llm_confidence;
    const llm  = conf ? `<span class="${conf==='high'?'llm-high':conf==='medium'?'llm-medium':'llm-low'}">${conf==='high'?'高':conf==='medium'?'中':'低'}</span>` : '—';
    const bt   = h.bar_time ? new Date(h.bar_time).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    const regClass = (h.regime||'').includes('bull') ? 'bull' : (h.regime||'').includes('bear') ? 'bear' : 'ranging';
    return `<tr>
      <td class="symbol">${(h.symbol||'').replace('USDT','')}<span style="color:var(--text2)">/USDT</span></td>
      <td><span class="pill pill-${cat}">${h.pattern_id}</span> <span style="color:var(--text2);font-size:11px">${h.pattern_name||''}</span></td>
      <td><span class="pill pill-${h.direction}">${h.direction==='long'?'做多':h.direction==='short'?'做空':'—'}</span></td>
      <td><span style="color:${color};font-weight:600">${score.toFixed(0)}</span></td>
      <td><span class="pill pill-${regClass}">${(h.regime||'').replace('_',' ')}</span></td>
      <td class="${h.trigger_met?'trigger-yes':'trigger-no'}">${h.trigger_met?'✓':'—'}</td>
      <td>${llm}</td>
      <td style="color:var(--text2);font-size:12px">${bt}</td>
      <td>${fwdHtml}</td>
    </tr>`;
  }).join('');
}

function renderDist(rets) {
  const bucketSize = 0.005; // 0.5%
  const min = -0.10, max = 0.10;
  const buckets = {};
  for (let b = min; b < max; b += bucketSize) {
    buckets[b.toFixed(3)] = 0;
  }
  for (const r of rets) {
    const b = (Math.floor(r / bucketSize) * bucketSize).toFixed(3);
    if (buckets[b] !== undefined) buckets[b]++;
  }
  const vals  = Object.values(buckets);
  const maxV  = Math.max(...vals, 1);
  const barsEl   = document.getElementById('h-dist-bars');
  const labelsEl = document.getElementById('h-dist-labels');
  barsEl.innerHTML = Object.entries(buckets).map(([k, v]) => {
    const h = Math.round((v / maxV) * 60);
    const pct = parseFloat(k) * 100;
    const col = pct > 0.5 ? 'var(--green)' : pct < -0.5 ? 'var(--red)' : 'var(--yellow)';
    return `<div style="width:8px;height:${h}px;background:${col};border-radius:2px 2px 0 0;flex-shrink:0" title="${pct.toFixed(1)}%: ${v}次"></div>`;
  }).join('');
  labelsEl.innerHTML = Object.keys(buckets).filter((k,i) => i % 8 === 0).map(k =>
    `<span style="flex:1;text-align:center">${(parseFloat(k)*100).toFixed(0)}%</span>`
  ).join('');
  document.getElementById('h-dist').classList.remove('hidden');
}

async function runBacktest() {
  const btn = document.getElementById('bt-run-btn');
  btn.textContent = '运行中...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/run-backtest', {method:'POST'});
    const d = await r.json();
    if (d.error) alert('回测失败: ' + d.error);
    else {
      alert(`回测完成！计算了 ${d.groups_computed} 个形态×体制组合，覆盖 ${d.symbols} 个交易对`);
      _backtest = [];  // 清空缓存，下次切到回测tab时重新加载
    }
  } catch(e) { alert('请求失败: ' + e); }
  finally {
    btn.textContent = '运行回测';
    btn.disabled = false;
  }
}

// ── 构建详情单元格 ────────────────────────────────────────────────────────────
function buildDetailCell(r, pDef, winStr, barTime) {
  const fieldResults = r.field_results || {};
  const rawValues    = r.raw_values    || {};

  // 字段结果块（分确认/排除/触发）
  const allFields = pDef ? [
    ...(pDef.confirm_fields || []),
    ...(pDef.exclude_fields || []),
    ...(pDef.trigger_fields || []),
  ] : [];

  const fieldRows = allFields.map(f => {
    const res    = fieldResults[f.field_id] || {};
    const hit    = res.hit;
    const val    = res.value != null ? fmtVal(res.value) : (rawValues[f.indicator] != null ? fmtVal(rawValues[f.indicator]) : '—');
    const type   = f.field_type;
    let statusCls, statusIcon;
    if (hit === true)       { statusCls = 'df-pass'; statusIcon = '✓'; }
    else if (hit === false) { statusCls = 'df-fail'; statusIcon = '✗'; }
    else                    { statusCls = 'df-na';   statusIcon = '·'; }
    const borderColor = type === 'exclude' ? 'var(--red)' : type === 'trigger' ? 'var(--blue)' : hit ? 'var(--green)' : '#333';
    return `<div class="detail-field" style="border-top-color:${borderColor}">
      <div class="df-status ${statusCls}">${statusIcon}</div>
      <div class="df-name">${f.field_name || f.field_id} <span style="color:var(--text2);font-size:10px">[${type}]</span></div>
      <div class="df-val">${val}</div>
    </div>`;
  }).join('');

  // 关键原始指标块
  const KEY_LABELS = {
    max_advance_45: '前序涨幅',  max_advance_40: '前序跌幅',
    platform_range_ratio: '平台振幅比',  pullback_ratio: '回调幅度',
    vol_ma20: '近期成交量均值',  atr14: 'ATR(14)',
    atr_ratio: 'ATR比率',        bb_width: '布林带宽',
    rsi14: 'RSI(14)',             ma20: 'MA20',
    ma60: 'MA60',                 ma120: 'MA120',
  };
  const rawRows = Object.entries(rawValues)
    .filter(([k]) => KEY_LABELS[k])
    .map(([k, v]) => `<div class="detail-field">
      <div class="df-name">${KEY_LABELS[k]}</div>
      <div class="df-val">${fmtVal(v)}</div>
    </div>`).join('');

  // 时间段说明
  const timeSummary = `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">
    <b style="color:var(--text)">分析区间</b>：${winStr || '—'} → ${barTime}
    &nbsp;·&nbsp; 体制得分 ${r.regime_score?.toFixed(1) || '—'}
    &nbsp;·&nbsp; 确认得分 ${r.confirm_score?.toFixed(1) || '—'}
    &nbsp;·&nbsp; 排除扣分 ${r.exclude_penalty?.toFixed(1) || '—'}
  </div>`;

  // LLM推理
  const llmBlock = r.llm_reasoning
    ? `<div class="llm-reasoning"><b style="color:var(--blue)">LLM 分析</b>（置信 ${r.llm_confidence || '—'}，风险 ${r.llm_risk || '—'}）<br>${r.llm_reasoning}</div>`
    : '';

  return `<td colspan="10">
    <div class="detail-panel">
      <div class="detail-block">
        ${timeSummary}
        <h4>字段评估</h4>
        ${fieldRows || '<div style="color:var(--text2);font-size:12px">暂无字段数据</div>'}
      </div>
      <div class="detail-block">
        <h4>关键指标</h4>
        ${rawRows || '<div style="color:var(--text2);font-size:12px">暂无原始指标</div>'}
        ${llmBlock}
      </div>
    </div>
  </td>`;
}

function fmtVal(v) {
  if (v == null) return '—';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') {
    if (Math.abs(v) < 10) return v.toFixed(4);
    if (Math.abs(v) < 1000) return v.toFixed(2);
    return v.toLocaleString('en-US', {maximumFractionDigits: 0});
  }
  return String(v);
}

// ── 初始化 ───────────────────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 60000); // 每分钟自动刷新

// ── K线诊断 ──────────────────────────────────────────────────────────────────
async function runDiagnose() {
  const sym      = document.getElementById('dg-symbol').value.trim();
  const endtime  = document.getElementById('dg-endtime').value;
  const lookback = document.getElementById('dg-lookback').value;
  const tf       = document.getElementById('dg-tf').value;
  if (!sym) { alert('请输入交易对'); return; }

  const el = document.getElementById('dg-result');
  el.innerHTML = '<div class="loading" style="padding:40px">正在分析，LLM诊断需要约10秒...</div>';

  try {
    const body = { symbol: sym, timeframe: tf, lookback_bars: parseInt(lookback) };
    if (endtime) body.end_time = new Date(endtime).toISOString();
    const r = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.error) { el.innerHTML = `<div class="loading" style="color:var(--red)">${d.error}</div>`; return; }
    el.innerHTML = renderDiagnose(d);
  } catch(e) {
    el.innerHTML = `<div class="loading" style="color:var(--red)">请求失败: ${e}</div>`;
  }
}

function renderDiagnose(d) {
  // 体制卡片
  const regCls = (d.regime||'').includes('bull') ? 'bull' : (d.regime||'').includes('bear') ? 'bear' : 'ranging';
  const sb = d.start_bar ? new Date(d.start_bar).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  const eb = d.end_bar   ? new Date(d.end_bar).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';

  const regimeCard = `<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="stat-card"><div class="stat-label">交易对</div><div class="stat-value" style="font-size:18px">${d.symbol.replace('USDT','')}/USDT</div></div>
    <div class="stat-card"><div class="stat-label">分析区间</div><div class="stat-value" style="font-size:14px">${sb} → ${eb}</div><div class="stat-label">${d.bars_analyzed}根${d.timeframe}K线</div></div>
    <div class="stat-card"><div class="stat-label">市场体制</div><div class="stat-value"><span class="pill pill-${regCls}">${(d.regime||'').replace('_',' ')}</span></div></div>
    <div class="stat-card"><div class="stat-label">体制得分</div><div class="stat-value" style="color:var(--yellow)">${(d.regime_score||0).toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">趋势得分</div><div class="stat-value">${(d.trend_score||0).toFixed(0)}</div></div>
    <div class="stat-card"><div class="stat-label">波动得分</div><div class="stat-value">${(d.vol_score||0).toFixed(0)}</div></div>
  </div>`;

  // 形态得分条形图
  const scores = d.pattern_scores || [];
  const maxScore = Math.max(...scores.map(p => p.total_score), 1);
  const scoreRows = scores.map(p => {
    const pct  = Math.max(0, p.total_score);
    const barW = Math.round((pct / 100) * 100);
    const color = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--border)';
    const cat   = (p.pattern_id||'A')[0];
    const trig  = p.trigger_met ? ' <span style="color:var(--blue);font-size:11px">▲触发</span>' : '';
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:90px;font-size:12px;flex-shrink:0"><span class="pill pill-${cat}" style="font-size:11px;padding:1px 6px">${p.pattern_id}</span> ${p.direction==='long'?'多':'空'}</span>
      <div style="flex:1;background:var(--border);border-radius:2px;height:14px;position:relative">
        <div style="width:${barW}%;background:${color};height:100%;border-radius:2px;transition:width .3s"></div>
      </div>
      <span style="width:42px;text-align:right;font-size:13px;font-weight:600;color:${color}">${pct.toFixed(0)}</span>
      ${trig}
      <span style="font-size:11px;color:var(--text2);width:120px">${p.pattern_name||''}</span>
    </div>`;
  }).join('');

  const scoresPanel = `<div class="detail-block" style="margin-bottom:16px">
    <h4 style="margin:0 0 10px">形态得分（全量，≥75为候选）</h4>
    ${scoreRows}
  </div>`;

  // LLM 诊断卡片
  let llmPanel = '';
  const llm = d.llm_analysis;
  if (llm && !llm.error) {
    const confCls = llm.confidence === 'high' ? 'llm-high' : llm.confidence === 'medium' ? 'llm-medium' : 'llm-low';
    const confLabel = llm.confidence === 'high' ? '高' : llm.confidence === 'medium' ? '中' : '低';
    const features = (llm.key_features || []).map(f => `<span style="background:var(--card2,#222);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:12px;margin:2px 2px">${f}</span>`).join('');
    llmPanel = `<div class="detail-block" style="margin-bottom:16px;border-left:3px solid var(--blue)">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <h4 style="margin:0">LLM 结构诊断</h4>
        <span style="font-size:20px;font-weight:700;color:var(--green)">${llm.structure_label||''}</span>
        <span class="${confCls}" style="font-size:12px">置信 ${confLabel}</span>
      </div>
      <div style="font-size:13px;color:var(--text);margin-bottom:8px"><b>结构类型：</b>${llm.structure_type||'—'}</div>
      <div style="margin-bottom:8px">${features}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.6">
        <div><b style="color:var(--text)">趋势：</b>${llm.trend_assessment||'—'}</div>
        <div><b style="color:var(--text)">量能：</b>${llm.volume_assessment||'—'}</div>
        <div><b style="color:var(--text)">后续：</b>${llm.next_scenario||'—'}</div>
        <div style="margin-top:6px"><b style="color:var(--text)">综合：</b>${llm.reasoning||'—'}</div>
      </div>
    </div>`;
  } else if (llm && llm.error) {
    llmPanel = `<div class="detail-block" style="color:var(--text2);font-size:12px">LLM诊断失败: ${llm.error}</div>`;
  } else {
    llmPanel = `<div class="detail-block" style="color:var(--text2);font-size:12px">LLM未配置或未运行</div>`;
  }

  // 最高分形态字段详情
  let topDetail = '';
  const top = d.top_pattern;
  if (top) {
    const fieldRows = Object.entries(top.field_results||{}).map(([fid, hit]) => {
      const val = top.raw_values?.[fid];
      const icon = hit ? '✓' : '✗';
      const cls  = hit ? 'df-pass' : 'df-fail';
      return `<div style="display:flex;gap:8px;align-items:center;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)">
        <span class="${cls}" style="width:16px;text-align:center">${icon}</span>
        <span style="flex:1;color:var(--text2)">${fid}</span>
        <span style="color:var(--text)">${val!=null?fmtVal(val):'—'}</span>
      </div>`;
    }).join('');
    topDetail = `<div class="detail-block">
      <h4>最高分形态字段详情：${top.pattern_id} ${top.pattern_name}（${top.total_score.toFixed(0)}分）</h4>
      ${fieldRows}
    </div>`;
  }

  return `<div style="padding:16px">
    ${regimeCard}
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1;min-width:320px">${scoresPanel}${topDetail}</div>
      <div style="flex:1;min-width:300px">${llmPanel}</div>
    </div>
  </div>`;
}
</script>
</body>
</html>
