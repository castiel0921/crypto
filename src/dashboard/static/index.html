<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>套利策略</title>
    <link rel="stylesheet" href="/static/styles.css?_={{CACHE_BUST}}" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">实时监控</p>
          <h1>套利策略</h1>
          <p class="subtitle">Binance 与 OKX 跨交易所多市场套利监控</p>
        </div>
        <div class="hero-status">
          <div class="status-pill" id="connection-pill">连接中</div>
          <div class="status-meta">
            <span id="started-at">-</span>
          </div>
        </div>
      </header>

      <section class="summary-grid">
        <article class="metric-card">
          <span class="metric-label">活跃交易对</span>
          <strong id="metric-symbols">0</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">告警次数</span>
          <strong id="metric-opportunities">0</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">飞书推送</span>
          <strong id="metric-lark">空闲</strong>
        </article>
        <article class="metric-card">
          <span class="metric-label">在线连接</span>
          <strong id="metric-subscribers">0</strong>
        </article>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>合约持仓量 Top 20</h2>
          <span class="panel-tag">每分钟更新</span>
        </div>
        <div class="spread-table-wrapper">
          <table class="spread-table" id="oi-table">
            <thead>
              <tr>
                <th>交易对</th>
                <th>市场</th>
                <th>Binance 持仓</th>
                <th>OKX 持仓</th>
                <th>总持仓</th>
              </tr>
            </thead>
            <tbody id="oi-body"></tbody>
          </table>
          <div class="empty-state" id="oi-empty">等待持仓数据...</div>
        </div>
        <div class="oi-chart-wrapper">
          <h3 class="chart-title">30天合约持仓历史 (Binance)</h3>
          <canvas id="oi-daily-chart"></canvas>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>5分钟涨跌幅</h2>
          <span class="panel-tag">实时更新</span>
        </div>
        <div class="spread-table-wrapper">
          <table class="spread-table" id="movers-table">
            <thead>
              <tr>
                <th>交易对</th>
                <th>市场</th>
                <th>最新价 (USDT)</th>
                <th>5分钟涨跌幅</th>
              </tr>
            </thead>
            <tbody id="movers-body"></tbody>
          </table>
          <div class="empty-state" id="movers-empty">等待价格数据积累...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>价差排行</h2>
          <div class="market-tabs" id="market-tabs">
            <button class="tab-btn active" data-market="all">全部</button>
          </div>
        </div>
        <div class="spread-table-wrapper">
          <table class="spread-table" id="spread-table">
            <thead>
              <tr>
                <th>交易对</th>
                <th>市场</th>
                <th>方向</th>
                <th>净价差 (bps)</th>
                <th>毛价差 (USDT)</th>
                <th>买价</th>
                <th>卖价</th>
                <th>可成交量</th>
                <th>名义价值 (USDT)</th>
                <th>100U利润</th>
              </tr>
            </thead>
            <tbody id="spread-body"></tbody>
          </table>
          <div class="empty-state" id="spread-empty" style="display:none">等待双边数据...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>最近机会</h2>
          <span class="panel-tag">最新优先</span>
        </div>
        <div class="opportunity-list" id="opportunities"></div>
      </section>
    </div>

    <script src="/static/app.js?_={{CACHE_BUST}}" defer></script>
  </body>
</html>
